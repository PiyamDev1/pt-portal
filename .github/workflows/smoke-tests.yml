name: Smoke Tests

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SMOKE_USER_EMAIL: ${{ secrets.SMOKE_USER_EMAIL }}
      SMOKE_USER_PASSWORD: ${{ secrets.SMOKE_USER_PASSWORD }}
      SMOKE_USER_BRANCH_CODE: ${{ secrets.SMOKE_USER_BRANCH_CODE }}
      SMOKE_FAMILY_HEAD_ID: ${{ secrets.SMOKE_FAMILY_HEAD_ID }}
      SMOKE_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
      PLAYWRIGHT_BASE_URL: ${{ secrets.SMOKE_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Validate required smoke secrets
        id: validate
        run: |
          missing=0
          for v in SMOKE_USER_EMAIL SMOKE_USER_PASSWORD SMOKE_USER_BRANCH_CODE SMOKE_FAMILY_HEAD_ID SMOKE_BASE_URL; do
            if [ -z "${!v}" ]; then
              echo "Missing $v"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run smoke tests
        if: steps.validate.outputs.run_smoke == 'true'
        run: npm run test:smoke

      - name: Skip notice
        if: steps.validate.outputs.run_smoke != 'true'
        run: echo "Skipping smoke tests because required secrets are not configured."

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore